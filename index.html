<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origine - Hub Professionale v8</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <header class="bg-slate-900 text-white shadow-xl border-b border-amber-500/20 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-amber-400">ORIGINE</h1>
                <p class="text-[9px] uppercase tracking-widest text-slate-400">Hub Gestionale</p>
            </div>
            <select id="filtro-unita-generale" onchange="aggiornaTutto()" class="bg-slate-800 text-xs border border-slate-700 rounded-lg p-2 outline-none">
                <option value="TUTTE">Tutte le Unità</option>
                <option value="PT_A">PT - Interno A</option>
                <option value="PT_B">PT - Interno B</option>
            </select>
        </div>
        <div class="bg-slate-950/60 backdrop-blur-md">
            <div class="max-w-7xl mx-auto flex overflow-x-auto px-2">
                <button onclick="switchTab('panoramica')" class="tab-btn py-3 px-4 text-[11px] font-bold border-b-2 border-amber-500 text-amber-500">Finanze</button>
                <button onclick="switchTab('prenotazioni')" class="tab-btn py-3 px-4 text-[11px] font-bold border-b-2 border-transparent text-slate-400 hover:text-white">Prenotazioni</button>
                <button onclick="switchTab('analisi')" class="tab-btn py-3 px-4 text-[11px] font-bold border-b-2 border-transparent text-slate-400 hover:text-white">Analisi</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-6">
        <div id="panoramica" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-600 p-4 rounded-xl text-white shadow-lg"><h3 class="text-[9px] uppercase opacity-80">Entrate</h3><p id="txt-entrate" class="text-xl font-bold">€ 0.00</p></div>
                <div class="bg-rose-600 p-4 rounded-xl text-white shadow-lg"><h3 class="text-[9px] uppercase opacity-80">Uscite</h3><p id="txt-uscite" class="text-xl font-bold">€ 0.00</p></div>
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200">
                <table class="w-full text-xs">
                    <tbody id="tabella-finanze"></tbody>
                </table>
            </div>
        </div>

        <div id="analisi" class="tab-content space-y-4">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-sm font-bold mb-4">📈 Andamento Finanziario</h2>
                <canvas id="graficoFinanze"></canvas>
            </div>
        </div>
        
        </main>

    <script>
        let db, chart;
        const request = indexedDB.open("OrigineDB_V8", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("finanze", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; aggiornaTutto(); };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'analisi') generaGrafico();
        }

        function aggiornaTutto() { mostraFinanze(); }

        function mostraFinanze() {
            const tbody = document.getElementById('tabella-finanze');
            tbody.innerHTML = '';
            let totE = 0, totU = 0;
            db.transaction("finanze", "readonly").objectStore("finanze").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if(cursor) {
                    const f = cursor.value;
                    if(f.tipo === 'entrata') totE += f.importo; else totU += f.importo;
                    tbody.innerHTML += `<tr><td class="p-2">${f.desc}</td><td class="p-2 font-bold">${f.importo}€</td></tr>`;
                    cursor.continue();
                } else {
                    document.getElementById('txt-entrate').innerText = `€ ${totE.toFixed(2)}`;
                    document.getElementById('txt-uscite').innerText = `€ ${totU.toFixed(2)}`;
                }
            };
        }

        function generaGrafico() {
            const ctx = document.getElementById('graficoFinanze').getContext('2d');
            if(chart) chart.destroy();
            
            // Semplice esempio: Prendi dati dal DB e passa al grafico
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Entrate', 'Uscite'],
                    datasets: [{
                        data: [parseFloat(document.getElementById('txt-entrate').innerText.replace('€ ','')), 
                               parseFloat(document.getElementById('txt-uscite').innerText.replace('€ ',''))],
                        backgroundColor: ['#059669', '#e11d48']
                    }]
                }
            });
        }
    </script>
</body>
</html>
