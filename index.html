<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origine - Hub Professionale v8</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <header class="bg-slate-900 text-white shadow-xl border-b border-amber-500/20 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-amber-400 to-amber-200 bg-clip-text text-transparent">ORIGINE</h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold mt-0.5">Hub Gestionale</p>
            </div>
            <div class="w-full md:w-80 relative">
                <input type="text" id="ricerca-globale" oninput="filtraContenutoTab()" placeholder="🔍 Cerca per testo o #tag..." class="w-full bg-slate-800/80 border border-slate-700/60 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
        </div>
        
        <div class="bg-slate-950/60 border-t border-slate-800/50 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-4 flex space-x-1 overflow-x-auto">
                <button onclick="switchTab('panoramica')" class="tab-btn py-3.5 px-5 text-xs font-semibold border-b-2 border-amber-500 text-amber-500 cursor-pointer">Finanze</button>
                <button onclick="switchTab('analisi')" class="tab-btn py-3.5 px-5 text-xs font-semibold border-b-2 border-transparent text-slate-400 hover:text-white cursor-pointer">Analisi & Grafici</button>
                <button onclick="switchTab('prenotazioni')" class="tab-btn py-3.5 px-5 text-xs font-semibold border-b-2 border-transparent text-slate-400 hover:text-white cursor-pointer">Prenotazioni</button>
                <button onclick="switchTab('documenti')" class="tab-btn py-3.5 px-5 text-xs font-semibold border-b-2 border-transparent text-slate-400 hover:text-white cursor-pointer">Documenti</button>
                <button onclick="switchTab('note')" class="tab-btn py-3.5 px-5 text-xs font-semibold border-b-2 border-transparent text-slate-400 hover:text-white cursor-pointer">Note Operative</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
        
        <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-200/60 flex flex-col sm:flex-row justify-between items-center gap-4">
            <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Unità Attiva:</span>
            <select id="filtro-unita-generale" onchange="aggiornaTutto()" class="p-2.5 border border-slate-200 rounded-lg text-xs bg-slate-50 font-semibold text-slate-700 min-w-[240px]">
                <option value="TUTTE">Tutte le Unità (Flusso Globale)</option>
                <option value="PT_A">Piano Terra - Interno A</option>
                <option value="PT_B">Piano Terra - Interno B</option>
                <option value="COMUNE">Spazi Comuni</option>
            </select>
        </div>

        <div id="panoramica" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-5 rounded-xl shadow-xs border border-slate-200/60"><h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Flusso Netto</h3><p id="txt-bilancio" class="text-2xl font-bold tracking-tight mt-1 text-slate-900">€ 0.00</p></div>
                <div class="bg-white p-5 rounded-xl shadow-xs border border-slate-200/60 border-l-4 border-emerald-500"><h3 class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Entrate</h3><p id="txt-entrate" class="text-2xl font-bold tracking-tight text-emerald-600 mt-1">€ 0.00</p></div>
                <div class="bg-white p-5 rounded-xl shadow-xs border border-slate-200/60 border-l-4 border-rose-500"><h3 class="text-[10px] font-bold text-rose-600 uppercase tracking-wider">Uscite</h3><p id="txt-uscite" class="text-2xl font-bold tracking-tight text-rose-600 mt-1">€ 0.00</p></div>
            </div>

            <div class="bg-white p-5 rounded-xl border border-slate-200 space-y-4">
                <h2 class="text-sm font-bold text-slate-900 uppercase">💶 Registra Nuova Voce</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-3">
                    <select id="fin-unita" class="p-2.5 border border-slate-200 rounded-lg text-xs bg-white"><option value="PT_A">PT - Interno A</option><option value="PT_B">PT - Interno B</option><option value="COMUNE">Spazi Comuni</option></select>
                    <input type="text" id="fin-desc" placeholder="Causale (es: Utenze #giugno)" class="p-2.5 border border-slate-200 rounded-lg text-xs md:col-span-2">
                    <select id="fin-tipo" class="p-2.5 border border-slate-200 rounded-lg text-xs bg-white"><option value="uscita">Uscita / Spesa (-)</option><option value="entrata">Entrata (+)</option></select>
                    <input type="number" id="fin-importo" placeholder="Importo €" class="p-2.5 border border-slate-200 rounded-lg text-xs">
                </div>
                <button onclick="aggiungiTransazione()" class="bg-slate-900 text-white font-semibold py-2 px-5 rounded-lg text-xs hover:bg-amber-600 transition cursor-pointer">Registra Voce</button>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-xs text-slate-600 dynamic-table">
                    <thead class="bg-slate-900 text-white text-[10px] uppercase tracking-wider">
                        <tr>
                            <th class="p-3.5">Unità</th>
                            <th class="p-3.5">Causale</th>
                            <th class="p-3.5">Tipo</th>
                            <th class="p-3.5">Totale</th>
                            <th class="p-3.5 text-right">Azione</th>
                        </tr>
                    </thead>
                    <tbody id="tabella-finanze" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="analisi" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-xl border border-slate-200 flex flex-col items-center">
                <h2 class="text-sm font-bold text-slate-900 uppercase mb-6">📊 Grafico Bilancio Recente</h2>
                <div class="w-full max-w-sm">
                    <canvas id="graficoFinanze"></canvas>
                </div>
            </div>
        </div>

        <div id="prenotazioni" class="tab-content space-y-6">
            <div class="bg-white p-5 rounded-xl border border-slate-200 space-y-4">
                <h2 class="text-sm font-bold text-slate-900 uppercase">📅 Nuova Prenotazione</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
                    <input type="text" id="pr-nome" placeholder="Nome Inquilino" class="p-2.5 border border-slate-200 rounded-lg text-xs">
                    <input type="date" id="pr-in" class="p-2.5 border border-slate-200 rounded-lg text-xs">
                    <input type="date" id="pr-out" class="p-2.5 border border-slate-200 rounded-lg text-xs">
                    <select id="pr-unita" class="p-2.5 border border-slate-200 rounded-lg text-xs bg-white"><option value="PT_A">PT - Interno A</option><option value="PT_B">PT - Interno B</option></select>
                </div>
                <button onclick="aggiungiPrenotazione()" class="bg-slate-900 text-white font-semibold py-2 px-5 rounded-lg text-xs hover:bg-amber-600 transition cursor-pointer">Salva Richiesta</button>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-xs text-slate-600 dynamic-table">
                    <tbody id="tabella-prenotazioni" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="documenti" class="tab-content space-y-6">
            <div class="bg-white p-5 rounded-xl border border-slate-200 space-y-4">
                <h2 class="text-sm font-bold text-slate-900 uppercase">📁 Archivio Documenti</h2>
                <input type="file" id="doc-file" class="text-xs text-slate-500">
                <button onclick="caricaDocumento()" class="bg-slate-900 text-white font-semibold px-4 py-2 rounded-lg text-xs cursor-pointer">Salva File</button>
                <table class="w-full text-left text-xs text-slate-600 dynamic-table">
                    <tbody id="tabella-documenti" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="note" class="tab-content space-y-6">
            <div class="bg-white p-5 rounded-xl border border-slate-200 space-y-3">
                <h2 class="text-sm font-bold text-slate-900 uppercase">📝 Note di Gestione</h2>
                <textarea id="note-testo" rows="10" class="w-full p-3 border border-slate-200 rounded-xl text-xs font-mono" placeholder="Scrivi qui appunti o promemoria..."></textarea>
                <button onclick="salvaNote()" class="bg-slate-900 text-white font-semibold py-2 px-5 rounded-lg text-xs hover:bg-amber-600 transition cursor-pointer">Salva Note</button>
            </div>
        </div>

        <div class="flex justify-end p-4 bg-slate-100 rounded-xl border border-slate-200">
            <button onclick="esportaTutto()" class="bg-slate-700 text-white text-[10px] uppercase font-bold px-4 py-2 rounded-lg hover:bg-amber-600 transition cursor-pointer">Esporta Backup Completo (JSON)</button>
        </div>
    </main>

    <script>
        let db, chartFinanze;
        const nomiUnita = { "PT_A": "🏠 PT - Interno A", "PT_B": "🏠 PT - Interno B", "COMUNE": "🌳 Spazi Comuni" };

        const request = indexedDB.open("OrigineDB_V8", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("finanze", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("prenotazioni", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("documenti", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; aggiornaTutto(); caricaNote(); };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'analisi') generaGrafico();
        }

        function aggiornaTutto() { mostraFinanze(); mostraPrenotazioni(); mostraDocumenti(); }

        function filtraContenutoTab() {
            const query = document.getElementById('ricerca-globale').value.toLowerCase().trim();
            document.querySelectorAll('.tab-content.active .dynamic-table tbody tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(query) ? "" : "none";
            });
        }

        function aggiungiTransazione() {
            const unita = document.getElementById('fin-unita').value;
            const desc = document.getElementById('fin-desc').value;
            const tipo = document.getElementById('fin-tipo').value;
            const importo = parseFloat(document.getElementById('fin-importo').value);
            if (!desc || isNaN(importo)) return alert("Compila i campi.");
            
            const tx = db.transaction("finanze", "readwrite");
            tx.objectStore("finanze").add({ unita, desc, tipo, importo, data: new Date().toLocaleDateString('it-IT') });
            tx.oncomplete = () => {
                document.getElementById('fin-desc').value = '';
                document.getElementById('fin-importo').value = '';
                mostraFinanze();
            };
        }

        function mostraFinanze() {
            const filtro = document.getElementById('filtro-unita-generale').value;
            const tbody = document.getElementById('tabella-finanze'); tbody.innerHTML = '';
            let totE = 0, totU = 0;

            db.transaction("finanze", "readonly").objectStore("finanze").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const f = cursor.value;
                    if (filtro === "TUTTE" || f.unita === filtro) {
                        if (f.tipo === 'entrata') totE += f.importo; else totU += f.importo;
                        tbody.innerHTML += `
                            <tr class="border-b border-slate-100">
                                <td class="p-3 font-semibold">${nomiUnita[f.unita]}</td>
                                <td class="p-3">${f.desc}</td>
                                <td class="p-3"><span class="px-2 py-0.5 text-[10px] font-bold rounded ${f.tipo === 'entrata' ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}">${f.tipo.toUpperCase()}</span></td>
                                <td class="p-3 font-bold">€ ${f.importo.toFixed(2)}</td>
                                <td class="p-3 text-right"><button onclick="eliminaElemento('finanze', ${f.id}, mostraFinanze)" class="text-rose-600 font-bold hover:underline">Elimina</button></td>
                            </tr>`;
                    }
                    cursor.continue();
                } else {
                    document.getElementById('txt-entrate').innerText = `€ ${totE.toFixed(2)}`;
                    document.getElementById('txt-uscite').innerText = `€ ${totU.toFixed(2)}`;
                    document.getElementById('txt-bilancio').innerText = `€ ${(totE - totU).toFixed(2)}`;
                }
            };
        }

        function generaGrafico() {
            const ctx = document.getElementById('graficoFinanze').getContext('2d');
            if(chartFinanze) chartFinanze.destroy();
            const entrate = parseFloat(document.getElementById('txt-entrate').innerText.replace('€ ', '')) || 0;
            const uscite = parseFloat(document.getElementById('txt-uscite').innerText.replace('€ ', '')) || 0;

            chartFinanze = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Entrate (€)', 'Uscite (€)'],
                    datasets: [{ data: [entrate, uscite], backgroundColor: ['#059669', '#e11d48'] }]
                },
                options: { responsive: true }
            });
        }

        function aggiungiPrenotazione() {
            const nome = document.getElementById('pr-nome').value;
            const checkin = document.getElementById('pr-in').value;
            const checkout = document.getElementById('pr-out').value;
            const unita = document.getElementById('pr-unita').value;
            if(!nome || !checkin || !checkout) return alert("Compila i campi.");
            const tx = db.transaction("prenotazioni", "readwrite");
            tx.objectStore("prenotazioni").add({ nome, checkin, checkout, unita });
            tx.oncomplete = () => { document.getElementById('pr-nome').value = ''; mostraPrenotazioni(); };
        }

        function mostraPrenotazioni() {
            const filtro = document.getElementById('filtro-unita-generale').value;
            const tbody = document.getElementById('tabella-prenotazioni'); tbody.innerHTML = '';
            db.transaction("prenotazioni", "readonly").objectStore("prenotazioni").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if(cursor) {
                    const p = cursor.value;
                    if(filtro === "TUTTE" || p.unita === filtro) {
                        tbody.innerHTML += `<tr class="border-b p-2">
                            <td class="p-3 font-semibold">${nomiUnita[p.unita]}</td>
                            <td class="p-3 font-bold">${p.nome}</td>
                            <td class="p-3">${p.checkin} ➡️ ${p.checkout}</td>
                            <td class="p-3 text-right"><button onclick="eliminaElemento('prenotazioni', ${p.id}, mostraPrenotazioni)" class="text-rose-600 font-bold">Rimuovi</button></td>
                        </tr>`;
                    }
                    cursor.continue();
                }
            };
        }

        function caricaDocumento() {
            const fileInput = document.getElementById('doc-file'); if (fileInput.files.length === 0) return;
            const file = fileInput.files[0]; const reader = new FileReader();
            reader.onload = (e) => {
                db.transaction("documenti", "readwrite").objectStore("documenti").add({ unita: document.getElementById('filtro-unita-generale').value, nome: file.name, fileData: e.target.result });
                mostraDocumenti();
            };
            reader.readAsDataURL(file);
        }

        function mostraDocumenti() {
            const tbody = document.getElementById('tabella-documenti'); tbody.innerHTML = '';
            db.transaction("documenti", "readonly").objectStore("documenti").openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if(cursor) {
                    const d = cursor.value;
                    tbody.innerHTML += `<tr class="border-b p-2">
                        <td class="p-3 font-medium">${d.nome}</td>
                        <td class="p-3 text-right"><a href="${d.fileData}" download="${d.nome}" class="text-indigo-600 font-bold mr-3">Scarica</a><button onclick="eliminaElemento('documenti', ${d.id}, mostraDocumenti)" class="text-rose-600 font-bold">Elimina</button></td>
                    </tr>`;
                    cursor.continue();
                }
            };
        }

        function eliminaElemento(storeName, id, callback) {
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).delete(id);
            tx.oncomplete = () => callback();
        }
        function salvaNote() { localStorage.setItem('origine_note', document.getElementById('note-testo').value); alert("Note salvate!"); }
        function caricaNote() { const n = localStorage.getItem('origine_note'); if(n) document.getElementById('note-testo').value = n; }

        function esportaTutto() {
            const backup = { finanze: [], prenotazioni: [], documenti: [], note: localStorage.getItem('origine_note') };
            const tx = db.transaction(["finanze", "prenotazioni", "documenti"], "readonly");
            tx.objectStore("finanze").getAll().onsuccess = (e) => backup.finanze = e.target.result;
            tx.objectStore("prenotazioni").getAll().onsuccess = (e) => backup.prenotazioni = e.target.result;
            tx.objectStore("documenti").getAll().onsuccess = (e) => backup.documenti = e.target.result;
            tx.oncomplete = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
                const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "Backup_Origine.json"); dl.click();
            };
        }
    </script>
</body>
</html>
